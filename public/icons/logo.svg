<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define the center point for rotation -->
  <defs>
    <rect id="rect-center" x="50" y="50" width="100" height="100" />
  </defs>
  <g>
    <!-- Orange Circle -->
    <circle cx="80" cy="110" r="70" fill="orange" fill-opacity="0.8" />
    <!-- Pink Circle -->
    <circle cx="110" cy="100" r="70" fill="pink" fill-opacity="0.8" />
    <!-- Sky Blue Circle -->
    <circle cx="80" cy="80" r="70" fill="skyblue" fill-opacity="0.8" />
    <!-- Animation for rotation -->
    <animateTransform attributeName="transform"
                      attributeType="XML"
                      type="rotate"
                      from="0 100 100"
                      to="360 100 100"
                      dur="3s"
                      repeatCount="indefinite" />
  </g>
</svg>